name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        variant: [release, dev, codex]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build executable (${{ matrix.variant }})
        run: python scripts/build/build.py --variant ${{ matrix.variant }} --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-exe
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"*.exe release/ 2>/dev/null || true
          done
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog snippet
        id: changelog
        run: |
          # Extract the latest section from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Get content between first and second ## headers
            NOTES=$(awk '/^## /{if(c++)exit}c' CHANGELOG.md | head -50)
          else
            NOTES=""
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.VERSION }}"
          fi
          # Write to file to preserve multiline
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DevLearnerAI v${{ steps.version.outputs.VERSION }}"
          body_path: /tmp/release_notes.md
          files: release/*.exe
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
